name: "MLAOS: The Trivium Filter"
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  trivium_validation:
    name: "Ascending the Winding Stairs"
    runs-on: ubuntu-latest
    steps:
      - name: "Grammar: Checkout"
        uses: actions/checkout@v4
      
      - name: "Logic: Dialectical Inquiry"
        run: |
          if [ -f scripts/logic_gate.py ]; then
            python scripts/logic_gate.py --strict-dogma
          else
            echo "ERROR: Logic Gate not found at scripts/logic_gate.py"
            exit 1
          fi

      - name: "Rhetoric: Final Certification"
        if: success()
        run: echo "Level 4: Pine Cone Awarded."
