version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlaos-api-dev
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://mlaos:mlaos_dev_password@postgres:5432/mlaos_db
    volumes:
      # Bind mount source code for live reload
      - ./src:/app/src
      - ./audits:/app/audits
      - ./api.py:/app/api.py
      - ./conftest.py:/app/conftest.py
      - ./requirements.txt:/app/requirements.txt
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn api:app --host 0.0.0.0 --port 8080 --reload
    networks:
      - mlaos-network

  postgres:
    image: postgres:15-alpine
    container_name: mlaos-postgres-dev
    environment:
      POSTGRES_USER: mlaos
      POSTGRES_PASSWORD: mlaos_dev_password
      POSTGRES_DB: mlaos_db
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlaos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlaos-network

  # Pruning automation service (runs periodically)
  pruning:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlaos-pruning
    environment:
      - DATABASE_URL=postgresql://mlaos:mlaos_dev_password@postgres:5432/mlaos_db
      - PRUNING_THRESHOLD_DAYS=30
    volumes:
      - ./audits:/app/audits
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    command: python audits/pruning_automation.py
    networks:
      - mlaos-network
    profiles:
      - audits

  # Skew analysis service
  skew-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlaos-skew-analysis
    environment:
      - DATABASE_URL=postgresql://mlaos:mlaos_dev_password@postgres:5432/mlaos_db
      - MODEL_VERSION=AURELIA-v2.3
    volumes:
      - ./audits:/app/audits
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    command: python audits/skew_analysis.py
    networks:
      - mlaos-network
    profiles:
      - audits

  # Test runner
  test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlaos-test
    working_dir: /app
    command: pytest -v --cov=src tests/
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://mlaos:mlaos_dev_password@postgres:5432/mlaos_db_test
    volumes:
      - ./tests:/app/tests
      - ./src:/app/src
      - ./audits:/app/audits
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mlaos-network
    profiles:
      - test

volumes:
  postgres_dev_data:

networks:
  mlaos-network:
    driver: bridge
