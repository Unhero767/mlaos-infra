version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlaos-api-prod
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mlaos-network
    # Resource limits for production
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15-alpine
    container_name: mlaos-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlaos-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Pruning service (runs daily via cron/scheduler)
  pruning:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlaos-pruning-prod
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PRUNING_THRESHOLD_DAYS=30
    depends_on:
      postgres:
        condition: service_healthy
    command: python audits/pruning_automation.py
    networks:
      - mlaos-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - audits

  # Skew analysis service (runs weekly via cron/scheduler)
  skew-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlaos-skew-analysis-prod
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MODEL_VERSION=${MODEL_VERSION:-AURELIA-v2.3}
    depends_on:
      postgres:
        condition: service_healthy
    command: python audits/skew_analysis.py
    networks:
      - mlaos-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - audits

volumes:
  postgres_prod_data:

networks:
  mlaos-network:
    driver: bridge
